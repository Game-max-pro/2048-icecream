<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fruit 2048</title>
    <style>
        :root {
            --bg-color: #F7FFF7;
            --grid-bg: #CCE3DE;
            --text-color: #2F3E46;
        }

        * {
            box-sizing: border-box;
            /* Prevents blue flashing boxes on mobile tap */
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
            /* Stops mobile web browsers from accidentally reloading on swipe down */
            overflow: hidden; 
            position: fixed;
            width: 100%;
            height: 100%;
        }

        h1 {
            margin: 5px 0;
            font-size: 2.2rem;
            text-shadow: 2px 2px #E8F5E9;
        }

        .score-container {
            background: #A3B18A;
            color: white;
            padding: 8px 25px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #game-container {
            position: relative;
            /* Prevents browser pull-to-refresh on touch screens */
            touch-action: none; 
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            grid-gap: 10px;
            background-color: var(--grid-bg);
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 320px;
            height: 320px;
        }

        .tile {
            background-color: #EAF4F4;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 2.4rem;
            position: relative;
            font-weight: bold;
            transition: all 0.1s ease-in-out;
            user-select: none;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
            width: 100%;
            height: 100%;
        }

        .tile-number {
            position: absolute;
            bottom: 4px;
            left: 6px;
            font-size: 0.75rem;
            color: #2F3E46;
            font-family: monospace;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.7);
            padding: 1px 3px;
            border-radius: 3px;
            line-height: 1;
        }

        .tile-0 { background-color: #EAF4F4; }
        .tile-2 { background-color: #FFF3CD; } 
        .tile-4 { background-color: #FFE5D9; } 
        .tile-8 { background-color: #FFD7BA; } 
        .tile-16 { background-color: #FEC5BB; } 
        .tile-32 { background-color: #E8FAE6; } 
        .tile-64 { background-color: #EAE2B7; } 
        .tile-128 { background-color: #FCD5CE; } 
        .tile-256 { background-color: #ECE4DB; } 
        .tile-512 { background-color: #E8DBFF; } 
        .tile-1024 { background-color: #FFCCD5; } 
        .tile-2048 { background-color: #D8F3DC; } 

        #game-over {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(247, 255, 247, 0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            z-index: 10;
        }

        #game-over h2 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        button {
            background-color: #52B788;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px #40916C;
        }

        button:active {
            box-shadow: none;
            transform: translateY(4px);
        }

        .instructions {
            margin-top: 15px;
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <h1>🍎 Fruit 2048 🍉</h1>
    <div class="score-container">Score: <span id="score">0</span></div>

    <div id="game-container">
        <div id="grid"></div>
        <div id="game-over">
            <h2>Game Over! 🍏</h2>
            <button onclick="resetGame()">Harvest Again</button>
        </div>
    </div>

    <div class="instructions">Swipe on your screen or use your Arrow keys to match fruits!</div>

    <script>
        const gridDisplay = document.getElementById('grid');
        const scoreDisplay = document.getElementById('score');
        const gameOverDisplay = document.getElementById('game-over');
        const width = 4;
        let board = [];
        let score = 0;

        const fruitFlavors = {
            2: '🍒', 4: '🍓', 8: '🍊', 16: '🍋', 32: '🍏', 64: '🍌',   
            128: '🍑', 256: '🥝', 512: '🍇', 1024: '🍉', 2048: '🍍'  
        };

        function createBoard() {
            board = Array(width * width).fill(0);
            gridDisplay.innerHTML = '';
            for (let i = 0; i < width * width; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile', 'tile-0');
                gridDisplay.appendChild(tile);
            }
            generateNumber();
            generateNumber();
            updateDisplay();
        }

        function generateNumber() {
            const emptyTiles = board.map((val, idx) => val === 0 ? idx : null).filter(val => val !== null);
            if (emptyTiles.length > 0) {
                const randomIdx = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
                board[randomIdx] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function updateDisplay() {
            const tiles = document.querySelectorAll('.tile');
            for (let i = 0; i < board.length; i++) {
                tiles[i].className = 'tile'; 
                tiles[i].innerHTML = ''; 
                
                const value = board[i];
                tiles[i].classList.add(`tile-${value}`);

                if (value > 0) {
                    tiles[i].innerText = fruitFlavors[value] || '🍇';
                    
                    const numLabel = document.createElement('span');
                    numLabel.classList.add('tile-number');
                    numLabel.innerText = value;
                    tiles[i].appendChild(numLabel);
                }
            }
            scoreDisplay.innerText = score;
            checkGameOver();
        }

        function slide(row) {
            let arr = row.filter(val => val);
            let missing = width - arr.length;
            let zeros = Array(missing).fill(0);
            return arr.concat(zeros);
        }

        function combine(row) {
            for (let i = 0; i < width - 1; i++) {
                if (row[i] === row[i + 1] && row[i] !== 0) {
                    row[i] = row[i] * 2;
                    row[i + 1] = 0;
                    score += row[i];
                }
            }
            return row;
        }

        function handleRowMove(direction) {
            let changed = false;
            for (let i = 0; i < width; i++) {
                let row = [board[i*4], board[i*4+1], board[i*4+2], board[i*4+3]];
                if (direction === 'right') row.reverse();
                row = slide(row); row = combine(row); row = slide(row);
                if (direction === 'right') row.reverse();

                for (let j = 0; j < width; j++) {
                    if (board[i*4 + j] !== row[j]) changed = true;
                    board[i*4 + j] = row[j];
                }
            }
            return changed;
        }

        function handleColMove(direction) {
            let changed = false;
            for (let i = 0; i < width; i++) {
                let col = [board[i], board[i+4], board[i+8], board[i+12]];
                if (direction === 'down') col.reverse();
                col = slide(col); col = combine(col); col = slide(col);
                if (direction === 'down') col.reverse();

                for (let j = 0; j < width; j++) {
                    if (board[i + j*4] !== col[j]) changed = true;
                    board[i + j*4] = col[j];
                }
            }
            return changed;
        }

        // --- KEYBOARD LOGIC ---
        function control(e) {
            let moved = false;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moved = handleRowMove('left');
            else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moved = handleRowMove('right');
            else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') moved = handleColMove('up');
            else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') moved = handleColMove('down');

            if (moved) { generateNumber(); updateDisplay(); }
        }

        // --- TOUCH / MOBILE SWIPE LOGIC ---
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        const gameContainer = document.getElementById('game-container');

        gameContainer.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
	}, { passive: true });
gameContainer.addEventListener('touchend', function(e) {
touchEndX = e.changedTouches[0].screenX;
touchEndY = e.changedTouches[0].screenY;
handleSwipe();
}, { passive: true });
function handleSwipe() {
const xDiff = touchEndX - touchStartX;
const yDiff = touchEndY - touchStartY;
let moved = false;
// Check if horizontal swipe or vertical swipe was bigger (minimum 30 pixels distance)
if (Math.max(Math.abs(xDiff), Math.abs(yDiff)) > 30) {
if (Math.abs(xDiff) > Math.abs(yDiff)) {
if (xDiff > 0) moved = handleRowMove('right');
else moved = handleRowMove('left');
} else {
if (yDiff > 0) moved = handleColMove('down');
else moved = handleColMove('up');
}
}
if (moved) { generateNumber(); updateDisplay(); }
}

function checkGameOver() {
if (board.includes(0)) return;
for (let i = 0; i < width; i++) {
for (let j = 0; j < width; j++) {
let current = board[i * width + j];
if (j < width - 1 && current === board[i * width + (j + 1)]) return;
if (i < width - 1 && current === board[(i + 1) * width + j]) return;
}
}
gameOverDisplay.style.display = 'flex';
}
function resetGame() {
gameOverDisplay.style.display = 'none';
score = 0;
createBoard();
}
document.addEventListener('keydown', control);
createBoard();
</script>
 </body>
  </html>
