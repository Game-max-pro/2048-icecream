<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream 2048</title>
    <style>
        :root {
            --bg-color: #FFF5F5;
            --grid-bg: #F0D5D5;
            --text-color: #5D4037;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        h1 {
            margin: 10px 0 5px 0;
            font-size: 2.5rem;
            text-shadow: 2px 2px #FFD1D1;
        }

        .score-container {
            background: #FFD1D1;
            padding: 10px 25px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #game-container {
            position: relative;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 12px;
            background-color: var(--grid-bg);
            padding: 12px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 340px;
            height: 340px;
        }

        .tile {
            background-color: #FFF;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 3rem; /* Emoji size */
            position: relative;
            font-weight: bold;
            transition: all 0.1s ease-in-out;
            user-select: none;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
        }

        /* Number in the lower left corner */
        .tile-number {
            position: absolute;
            bottom: 5px;
            left: 8px;
            font-size: 0.75rem;
            color: rgba(93, 64, 55, 0.7);
            font-family: monospace;
        }

        /* Ice cream flavor tile designs */
        .tile-0 { background-color: #FFEAE4; }
        .tile-2 { background-color: #FFF0F5; } /* Vanilla */
        .tile-4 { background-color: #FFDEE9; } /* Strawberry */
        .tile-8 { background-color: #E2C2B3; } /* Chocolate */
        .tile-16 { background-color: #E8F5E9; } /* Mint Choc Chip */
        .tile-32 { background-color: #FFF9C4; } /* Banana Split */
        .tile-64 { background-color: #FFE0B2; } /* Mango */
        .tile-128 { background-color: #E1BEE7; } /* Blueberry */
        .tile-256 { background-color: #F8BBD0; } /* Bubblegum */
        .tile-512 { background-color: #D1C4E9; } /* Taro */
        .tile-1024 { background-color: #DCEDC8; } /* Pistachio */
        .tile-2048 { background-color: #FFCCBC; } /* Ultimate Sundae */

        #game-over {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 245, 245, 0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
        }

        #game-over h2 {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        button {
            background-color: #FF8A8A;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px #FF5C5C;
        }

        button:active {
            box-shadow: none;
            transform: translateY(4px);
        }

        .instructions {
            margin-top: 15px;
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🍦 Ice Cream 2048 🍨</h1>
    <div class="score-container">Score: <span id="score">0</span></div>

    <div id="game-container">
        <div id="grid"></div>
        <div id="game-over">
            <h2>Melted! Game Over 😭</h2>
            <button onclick="resetGame()">Try Again</button>
        </div>
    </div>

    <div class="instructions">Use your <b>Arrow Keys</b> or <b>WASD</b> to scoop and merge flavors!</div>

    <script>
        const gridDisplay = document.getElementById('grid');
        const scoreDisplay = document.getElementById('score');
        const gameOverDisplay = document.getElementById('game-over');
        const width = 4;
        let board = [];
        let score = 0;

        // Ice cream emojis mapped to values
        const iceCreamFlavors = {
            2: '🍦',    // Vanilla
            4: '🍓',    // Strawberry
            8: '🍫',    // Chocolate
            16: '🌿',   // Mint
            32: '🍌',   // Banana
            64: '🥭',   // Mango
            128: '🫐',  // Blueberry
            256: '🍬',  // Bubblegum
            512: '🍠',  // Taro
            1024: '🥑', // Pistachio
            2048: '🍨'  // Ultimate Sundae
        };

        // Initialize the game board
        function createBoard() {
            board = Array(width * width).fill(0);
            gridDisplay.innerHTML = '';
            for (let i = 0; i < width * width; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile', 'tile-0');
                gridDisplay.appendChild(tile);
            }
            generateNumber();
            generateNumber();
            updateDisplay();
        }

        // Generate a random 2 or 4 tile in an empty slot
        function generateNumber() {
            const emptyTiles = board.map((val, idx) => val === 0 ? idx : null).filter(val => val !== null);
            if (emptyTiles.length > 0) {
                const randomIdx = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
                board[randomIdx] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // Update the visual appearance of the grid
        function updateDisplay() {
            const tiles = document.querySelectorAll('.tile');
            for (let i = 0; i < board.length; i++) {
                tiles[i].className = 'tile'; // Reset classes
                tiles[i].innerHTML = ''; // Reset text
                
                const value = board[i];
                tiles[i].classList.add(`tile-${value}`);

                if (value > 0) {
                    // Put the emoji in the center
                    tiles[i].innerText = iceCreamFlavors[value] || '🍧';
                    
                    // Add the number label to the bottom left
                    const numLabel = document.createElement('span');
                    numLabel.classList.add('tile-number');
                    numLabel.innerText = value;
                    tiles[i].appendChild(numLabel);
                }
            }
            scoreDisplay.innerText = score;
            checkGameOver();
        }

        // Slide row/column to the left
        function slide(row) {
            let arr = row.filter(val => val);
            let missing = width - arr.length;
            let zeros = Array(missing).fill(0);
            return arr.concat(zeros);
        }

        // Merge adjacent identical items
        function combine(row) {
            for (let i = 0; i < width - 1; i++) {
                if (row[i] === row[i + 1] && row[i] !== 0) {
                    row[i] = row[i] * 2;
                    row[i + 1] = 0;
                    score += row[i];
                }
            }
            return row;
        }

        // Handle row operations
        function handleRowMove(direction) {
            let changed = false;
            for (let i = 0; i < width; i++) {
                let row = [board[i*4], board[i*4+1], board[i*4+2], board[i*4+3]];
                if (direction === 'right') row.reverse();
                
                let original = [...row];
                row = slide(row);
                row = combine(row);
                row = slide(row);
                
                if (direction === 'right') row.reverse();

                for (let j = 0; j < width; j++) {
                    if (board[i*4 + j] !== row[j]) changed = true;
                    board[i*4 + j] = row[j];
                }
            }
            return changed;
        }

        // Handle column operations
        function handleColMove(direction) {
            let changed = false;
            for (let i = 0; i < width; i++) {
                let col = [board[i], board[i+4], board[i+8], board[i+12]];
                if (direction === 'down') col.reverse();
                
                let original = [...col];
                col = slide(col);
                col = combine(col);
                col = slide(col);
                
                if (direction === 'down') col.reverse();

                for (let j = 0; j < width; j++) {
                    if (board[i + j*4] !== col[j]) changed = true;
                    board[i + j*4] = col[j];
                }
            }
            return changed;
        }

        // Listen for keyboard controls
        function control(e) {
            let moved = false;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                moved = handleRowMove('left');
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                moved = handleRowMove('right');
            } else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                moved = handleColMove('up');
            } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
